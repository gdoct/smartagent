name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          activate-environment: true

      - name: Install ruff
        run: uv pip install ruff

      - name: Ruff check
        run: ruff check src/ test/

      - name: Ruff format check
        run: ruff format --check src/ test/
